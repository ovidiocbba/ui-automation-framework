name: Setup Environment
description: 'Install Java, Chrome, Firefox, Edge and configure Gradle cache'

# Inputs the action accepts.
inputs:
  java-ver:
    description: 'Java Version'
    required: true
  java-distribution:
    description: 'Java Distribution'
    required: true

runs:
  using: 'composite'

  steps:
    - name: Set up JDK for x64
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-ver }}
        distribution: ${{ inputs.java-distribution }}
        architecture: x64
        cache: gradle # enable built-in Gradle caching to speed up CI executions

    # Using shell script to install Google Chrome.
    - name: Install Google Chrome
      shell: bash
      run: |
        if command -v google-chrome >/dev/null 2>&1; then
          echo "Google Chrome already installed:"
          google-chrome --version
        else
          echo "Google Chrome not found. Installing..."
          chmod +x ./scripts/InstallChrome.sh
          ./scripts/InstallChrome.sh
          echo "Installed Chrome version:"
          google-chrome --version
        fi

    # Install Firefox if not present
    - name: Install Firefox
      shell: bash
      run: |
        if command -v firefox >/dev/null 2>&1; then
          echo "Firefox already installed:"
          firefox --version
        else
          echo "Firefox not found. Installing..."
          sudo apt-get update
          sudo apt-get install -y firefox-esr || sudo apt-get install -y firefox
          echo "Installed Firefox version:"
          firefox --version
        fi

    - name: Install Microsoft Edge
      shell: bash
      run: |
        if command -v microsoft-edge >/dev/null 2>&1; then
          echo "Edge already installed:"
          microsoft-edge --version
        else
          echo "Installing Edge..."
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -o root -g root -m 644 microsoft.gpg /usr/share/keyrings/
          sudo sh -c 'echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge-dev.list'
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable
          microsoft-edge --version
        fi
