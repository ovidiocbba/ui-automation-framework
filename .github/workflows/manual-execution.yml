name: Manual execution

env:
  JAVA_VERSION: 17.0.12

# Controls when the workflow will run.
on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      scenarioTag:
        description: 'Scenario Tag to execute(e.g. "@TC-00001")'
        type: string
        required: false
        default: '@regression'

      baseUrl:
        description: 'Base Url(e.g. "https://www.amazon.com")'
        type: string
        required: true
        default: 'https://www.amazon.com'

      explicitWait:
        description: 'Explicit wait timeout in seconds (e.g. "30")'
        type: string
        required: true
        default: '30'

      threads:
        description: 'Number of parallel threads (e.g. "2")'
        type: string
        required: false
        default: '2'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  build:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'
      # Compiles main and test code but does not run tests.
      - run: |
          ./gradlew build -x test

  # Checkstyle and PMD.
  static-analysis:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Run Static Analysis
        run: ./gradlew staticAnalysis

      - name: Upload Static Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: staticAnalysisReports${{ github.run_id }}
          path: ./build/reports
          retention-days: 5

  # Documentation generation.
  javadoc:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc${{ github.run_id }}
          path: ./build/docs/javadoc
          retention-days: 5

  execution:
    needs: [static-analysis, javadoc]
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    # Stops the job if it runs too long.
    timeout-minutes: 30

    # Prevents two workflows from deploying to 'gh-pages' at the same time.
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    # These permissions are required to generate reports.
    permissions:
      contents: write # To push a branch (gh_pages).

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Execute Features
        uses: ./.github/actions/execute-features
        with:
          scenarioTag: ${{ inputs.scenarioTag || '@regression' }}
          baseUrl: ${{ inputs.baseUrl }}
          explicitWait: ${{ inputs.explicitWait }}
          threads: ${{ inputs.threads }}

      - name: Deploy allure report
        if: always()
        uses: ./.github/actions/deploy-allure-report
        with:
          allure_results_path: ./build/allure-results
          publish_name_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
