name: Manual execution

env:
  JAVA_VERSION: 17.0.12

# Controls when the workflow will run.
on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      browser:
        description: 'Browser to execute (CHROME_HEADLESS | FIREFOX_HEADLESS | BOTH)'
        type: choice
        required: true
        default: CHROME_HEADLESS
        options:
          - CHROME_HEADLESS
          - FIREFOX_HEADLESS
          - BOTH

      scenarioTag:
        description: 'Scenario tag to execute (e.g. "@TC-00001")'
        type: string
        required: false
        default: '@regression'

      baseUrl:
        description: 'Base URL (e.g. "https://www.amazon.com")'
        type: string
        required: true
        default: 'https://www.amazon.com'

      explicitWait:
        description: 'Explicit wait timeout in seconds (e.g. "30")'
        type: string
        required: true
        default: '30'

      threads:
        description: 'Number of parallel threads (e.g. "2")'
        type: string
        required: false
        default: '2'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  build:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'
      # Compiles main and test code but does not run tests.
      - run: |
          ./gradlew build -x test

  # Checkstyle and PMD.
  static-analysis:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Run Static Analysis
        run: ./gradlew staticAnalysis

      - name: Upload Static Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports-${{ github.run_id }}
          path: ./build/reports
          retention-days: 5

  # Documentation generation.
  javadoc:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-${{ github.run_id }}
          path: ./build/docs/javadoc
          retention-days: 5

  execution:
    needs: [static-analysis, javadoc]
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    # Stops the job if it runs too long.
    timeout-minutes: 30

    strategy:
      matrix:
        browser: ${{ inputs.browser == 'BOTH' && fromJson('["CHROME_HEADLESS","FIREFOX_HEADLESS"]') || fromJson(format('["{0}"]', inputs.browser)) }}

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Execute Features
        uses: ./.github/actions/execute-features
        with:
          browser: ${{ matrix.browser }}
          scenarioTag: ${{ inputs.scenarioTag || '@regression' }}
          baseUrl: ${{ inputs.baseUrl }}
          explicitWait: ${{ inputs.explicitWait }}
          threads: ${{ inputs.threads }}

  generate-and-deploy-report:
    needs: execution
    runs-on: ubuntu-latest

    # Prevents two workflows from deploying to 'gh-pages' at the same time.
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    # These permissions are required to generate reports.
    permissions:
      contents: write # To push a branch (gh_pages).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node (for Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # Download artifacts from matrix execution
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: downloaded-results

      # Checkout gh-pages to restore history
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare Chrome results
        run: |
          if ls downloaded-results/allure-results-CHROME_HEADLESS-* 1> /dev/null 2>&1; then
            mkdir chrome-results
            for dir in downloaded-results/allure-results-CHROME_HEADLESS-*; do
              rsync -av "$dir/" chrome-results/
            done
          
            # Restore Chrome history if exists
            if [ -d "gh-pages/allure-chrome/history" ]; then
              mkdir -p chrome-results/history
              cp -r gh-pages/allure-chrome/history/* chrome-results/history/ || true
            fi
          
            npx allure generate chrome-results -o chrome-report --clean
          fi

      - name: Prepare Firefox results
        run: |
          if ls downloaded-results/allure-results-FIREFOX_HEADLESS-* 1> /dev/null 2>&1; then
            mkdir firefox-results
            for dir in downloaded-results/allure-results-FIREFOX_HEADLESS-*; do
              rsync -av "$dir/" firefox-results/
            done
          
            # Restore Firefox history if exists
            if [ -d "gh-pages/allure-firefox/history" ]; then
              mkdir -p firefox-results/history
              cp -r gh-pages/allure-firefox/history/* firefox-results/history/ || true
            fi
          
            npx allure generate firefox-results -o firefox-report --clean
          fi

      - name: Prepare final publish directory
        run: |
          mkdir -p public
          
          # Preserve existing reports if browser not executed
          if [ -d "gh-pages/allure-chrome" ]; then
            cp -r gh-pages/allure-chrome public/
          fi
          
          if [ -d "gh-pages/allure-firefox" ]; then
            cp -r gh-pages/allure-firefox public/
          fi
          
          # Overwrite only if new report exists
          if [ -d "chrome-report" ]; then
            rm -rf public/allure-chrome
            mv chrome-report public/allure-chrome
          fi
          
          if [ -d "firefox-report" ]; then
            rm -rf public/allure-firefox
            mv firefox-report public/allure-firefox
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
