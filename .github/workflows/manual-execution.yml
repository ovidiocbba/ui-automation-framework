name: Manual execution

env:
  JAVA_VERSION: 17.0.12
  # Force GitHub Actions to use Node.js 24 to avoid Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Controls when the workflow will run.
on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      browser:
        description: 'Browser to execute (CHROME_HEADLESS | FIREFOX_HEADLESS | EDGE_HEADLESS | ALL)'
        type: choice
        required: true
        default: CHROME_HEADLESS
        options:
          - CHROME_HEADLESS
          - FIREFOX_HEADLESS
          - EDGE_HEADLESS
          - ALL

      scenarioTag:
        description: 'Scenario tag to execute (e.g. "@TC-00001")'
        type: string
        required: false
        default: '@regression'

      baseUrl:
        description: 'Base URL (e.g. "https://www.amazon.com")'
        type: string
        required: true
        default: 'https://www.amazon.com'

      explicitWait:
        description: 'Explicit wait timeout in seconds (e.g. "30")'
        type: string
        required: true
        default: '30'

      threads:
        description: 'Number of parallel threads (e.g. "2")'
        type: string
        required: false
        default: '2'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  build:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'
      # Compiles main and test code but does not run tests.
      - run: |
          ./gradlew build -x test

  # Checkstyle and PMD.
  static-analysis:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Run Static Analysis
        run: ./gradlew staticAnalysis

      - name: Upload Static Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports-${{ github.run_id }}
          path: ./build/reports
          retention-days: 5

  # Documentation generation.
  javadoc:
    needs: build
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver:  ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-${{ github.run_id }}
          path: ./build/docs/javadoc
          retention-days: 5

  execution:
    needs: [static-analysis, javadoc]
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest
    # Stops the job if it runs too long.
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      # Allow all matrix jobs to finish even if one fails
      fail-fast: false
      matrix:
        browser: ${{ inputs.browser == 'ALL' && fromJson('["CHROME_HEADLESS","FIREFOX_HEADLESS","EDGE_HEADLESS"]') || fromJson(format('["{0}"]', inputs.browser)) }}

    steps:
      # Cloning you repository to the runner.
      - name: Checkout code
        uses: actions/checkout@v4 # Necessary to access local action.

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          java-ver: ${{ env.JAVA_VERSION }}
          java-distribution: 'temurin'

      - name: Execute Features
        uses: ./.github/actions/execute-features
        with:
          browser: ${{ matrix.browser }}
          scenarioTag: ${{ inputs.scenarioTag || '@regression' }}
          baseUrl: ${{ inputs.baseUrl }}
          explicitWait: ${{ inputs.explicitWait }}
          threads: ${{ inputs.threads }}

  generate-and-deploy-report:
    needs: execution
    # Run report even if execution job fails
    if: always()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Prevents two workflows from deploying to 'gh-pages' at the same time.
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    # These permissions are required to generate reports.
    permissions:
      contents: write # To push a branch (gh_pages).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate and Deploy Allure Reports
        uses: ./.github/actions/generate-report
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
